query GetExperienceProfile {
  experienceProfile {
    profile {
      id
      userId
      headline
      summary
      location
      yearsOfExperience
      skills
      customFields
      createdAt
      updatedAt
    }
    roles {
      id
      title
      company
      employmentType
      location
      startDate
      endDate
      isCurrent
      periodLabel
      durationLabel
      status
      summary
      techStack
      methodologies
      teamStructure
      keyAchievements
      missingDetails
      projects {
        id
        title
        period
        description
        achievements
      }
    }
  }
}
