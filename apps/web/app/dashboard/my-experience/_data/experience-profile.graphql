query GetExperienceProfile {
  experienceProfile {
    profile {
      id
      userId
      headline
      summary
      location
      yearsOfExperience
      skills
      customFields
      createdAt
      updatedAt
    }
    roles {
      id
      title
      company
      employmentType
      location
      startDate
      endDate
      isCurrent
      periodLabel
      durationLabel
      status
      summary
      techStack {
        value
        customLabel
      }
      methodologies
      teamStructure
      keyAchievements
      missingDetails
      keyMetrics {
        type
        customType
        value
        text
      }
      projects {
        id
        title
        period
        description
        achievements
        techStack {
          value
          customLabel
        }
      }
    }
  }
}
